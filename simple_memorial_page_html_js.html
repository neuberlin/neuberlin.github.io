<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>In Loving Memory</title>
  <style>
    :root {
      --bg: #0f172a;         /* slate-900 */
      --panel: #0b1224;      /* slightly different for depth */
      --text: #e2e8f0;       /* slate-200 */
      --muted: #94a3b8;      /* slate-400 */
      --accent: #fbbf24;     /* amber-400 */
      --ring: #22d3ee;       /* cyan-400 */
    }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: radial-gradient(1200px 800px at 70% -10%, #11193a 10%, var(--bg) 60%);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
      line-height: 1.5;
    }
    .container { max-width: 880px; margin: 0 auto; padding: 28px 20px 64px; }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35), inset 0 0 0 1px rgba(255,255,255,0.04);
      backdrop-filter: blur(6px);
    }
    header { text-align: center; margin-bottom: 16px; }
    h1 { font-size: 34px; letter-spacing: 0.4px; margin: 0 0 6px; }
    .dates { color: var(--muted); font-size: 16px; }
    .photo {
      width: 160px; height: 160px; border-radius: 16px; overflow: hidden; border: 2px solid rgba(255,255,255,0.2);
      box-shadow: 0 12px 24px rgba(0,0,0,0.35);
      margin: 18px auto 8px;
    }
    .photo img { width: 100%; height: 100%; object-fit: cover; display: block; }

    blockquote {
      margin: 16px auto 0; max-width: 640px; color: #f1f5f9; font-size: 18px; font-style: italic;
      border-left: 3px solid rgba(255,255,255,0.2); padding: 10px 14px;
    }
    .attribution { color: var(--muted); font-size: 14px; text-align: right; margin-top: 6px; }

    .row { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; margin-top: 20px; }
    @media (max-width: 820px) { .row { grid-template-columns: 1fr; } }

    /* Candle */
    .candle-card { text-align: center; }
    .candle-wrap { position: relative; display: inline-block; margin-top: 8px; }
    .flame { width: 14px; height: 22px; background: radial-gradient(closest-side, #ffd27a, #ff9900 65%, rgba(0,0,0,0) 70%);
      border-radius: 10px 10px 10px 10px/14px 14px 8px 8px;
      position: absolute; top: -26px; left: 50%; transform: translateX(-50%);
      filter: blur(0.3px);
      animation: flicker 2s infinite ease-in-out;
      box-shadow: 0 0 15px 4px rgba(251,191,36,0.45), 0 0 40px 12px rgba(251,191,36,0.2);
    }
    .wick { width: 3px; height: 10px; background: #111; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); border-radius: 1px; }
    .candle {
      width: 32px; height: 80px; background: linear-gradient(180deg, #eee, #cfcfd4 55%, #bdbfc7);
      border-radius: 6px; border: 1px solid rgba(0,0,0,0.25);
      position: relative; margin: 0 auto; box-shadow: inset 0 8px 14px rgba(255,255,255,0.7), inset 0 -10px 20px rgba(0,0,0,0.2);
    }
    .wax-drip { position: absolute; width: 8px; background: #ececf2; border-radius: 5px; left: 8px; top: 18px; height: 22px; box-shadow: inset 0 4px 6px rgba(0,0,0,0.08); }
    .wax-drip:nth-child(2) { left: 18px; height: 18px; top: 12px; }

    @keyframes flicker {
      0% { transform: translateX(-50%) scale(1); opacity: 0.95; }
      20% { transform: translateX(calc(-50% + 1px)) scale(1.03); opacity: 1; }
      40% { transform: translateX(calc(-50% - 1px)) scale(0.98); opacity: 0.92; }
      60% { transform: translateX(calc(-50% + 0.5px)) scale(1.04); opacity: 1; }
      80% { transform: translateX(calc(-50% - 0.5px)) scale(0.99); opacity: 0.94; }
      100% { transform: translateX(-50%) scale(1); opacity: 0.97; }
    }

    /* Memory wall */
    .mem-card h2 { margin: 8px 0 6px; font-size: 20px; }
    form { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-top: 8px; }
    textarea { resize: vertical; min-height: 60px; max-height: 200px; width: 100%; padding: 10px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); background: rgba(10,16,34,0.7); color: var(--text); }
    button {
      cursor: pointer; border: 1px solid rgba(255,255,255,0.15); background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04)); color: var(--text);
      padding: 10px 14px; border-radius: 12px; font-weight: 600; letter-spacing: 0.2px;
    }
    button:focus { outline: none; box-shadow: 0 0 0 3px rgba(34,211,238,0.35); border-color: var(--ring); }

    ul.memories { list-style: none; padding: 0; margin: 12px 0 0; display: grid; gap: 10px; }
    .mem { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10); border-radius: 14px; padding: 12px 14px; }
    .meta { color: var(--muted); font-size: 12px; margin-bottom: 6px; }

    .toolbar { display: flex; gap: 10px; justify-content: center; margin: 14px 0 0; }
    .toolbar button { font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <header>
        <div class="photo" aria-hidden="true">
          <img id="photo" alt="Portrait" />
        </div>
        <h1 id="name">In Loving Memory</h1>
        <div id="dates" class="dates" aria-label="Dates"></div>
      </header>

      <blockquote id="quote">“What we have once enjoyed we can never lose.”</blockquote>
      <div id="quoteBy" class="attribution">— Helen Keller</div>

      <div class="row">
        <div class="card candle-card">
          <h2>Light a candle</h2>
          <div class="candle-wrap" aria-label="Candle">
            <div class="flame" aria-hidden="true"></div>
            <div class="wick"></div>
            <div class="candle">
              <div class="wax-drip"></div>
              <div class="wax-drip"></div>
            </div>
          </div>
          <div class="toolbar">
            <button id="printBtn" title="Print this page">Print</button>
            <button id="editBtn" title="Edit details">Quick Edit</button>
            <button id="clearBtn" title="Clear all memories">Clear Memories</button>
          </div>
        </div>

        <div class="card mem-card">
          <h2>Share a memory</h2>
          <form id="memForm">
            <textarea id="memText" placeholder="Write a message or memory…" aria-label="Memory text"></textarea>
            <button type="submit">Post</button>
          </form>
          <ul id="memories" class="memories" aria-live="polite"></ul>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- Configure here, or use Quick Edit button in the UI ---
    const config = {
      name: "Charlie Kirk",
      birth: "October 14, 1993",
      death: "September 10, 2025",
      photo: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Charlie_Kirk_%2854506922389%29.jpg/1920px-Charlie_Kirk_%2854506922389%29.jpg",
      quote: "Darkness cannot drive out darkness, only light can do that. Hate cannot drive out hate, only love can do that.",
      quoteBy: "Martin Luther King Jr."
    };

    // DOM refs
    const el = {
      name: document.getElementById('name'),
      dates: document.getElementById('dates'),
      photo: document.getElementById('photo'),
      quote: document.getElementById('quote'),
      quoteBy: document.getElementById('quoteBy'),
      memForm: document.getElementById('memForm'),
      memText: document.getElementById('memText'),
      memories: document.getElementById('memories'),
      printBtn: document.getElementById('printBtn'),
      editBtn: document.getElementById('editBtn'),
      clearBtn: document.getElementById('clearBtn'),
    };

    // Init
    function applyConfig(c) {
      el.name.textContent = c.name ? `In Loving Memory of ${c.name}` : 'In Loving Memory';
      const dates = (c.birth || c.death) ? `${c.birth || ''} – ${c.death || ''}` : '';
      el.dates.textContent = dates;
      el.photo.src = c.photo || '';
      el.photo.alt = c.name ? `Portrait of ${c.name}` : 'Portrait';
      el.quote.textContent = `“${c.quote}”`;
      el.quoteBy.textContent = c.quoteBy ? `— ${c.quoteBy}` : '';
      document.title = c.name ? `In Memory of ${c.name}` : 'In Loving Memory';
    }

    applyConfig(config);

    // Memory wall persistence
    const STORAGE_KEY = 'memorial.memories.v1';

    function loadMemories() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
    }

    function saveMemories(items) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function renderMemories() {
      const items = loadMemories();
      el.memories.innerHTML = '';
      for (const it of items) {
        const li = document.createElement('li');
        li.className = 'mem';
        li.innerHTML = `<div class="meta">${new Date(it.ts).toLocaleString()}</div><div>${escapeHtml(it.text)}</div>`;
        el.memories.appendChild(li);
      }
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[ch]));
    }

    el.memForm.addEventListener('submit', e => {
      e.preventDefault();
      const text = el.memText.value.trim();
      if (!text) return;
      const items = loadMemories();
      items.unshift({ text, ts: Date.now() });
      saveMemories(items);
      el.memText.value = '';
      renderMemories();
    });

    // Toolbar
    el.printBtn.addEventListener('click', () => window.print());

    el.clearBtn.addEventListener('click', () => {
      if (confirm('Delete all memories on this device?')) {
        saveMemories([]); renderMemories();
      }
    });

    el.editBtn.addEventListener('click', () => {
      const name = prompt('Name', config.name) ?? config.name;
      const birth = prompt('Birth year', config.birth) ?? config.birth;
      const death = prompt('Death year', config.death) ?? config.death;
      const quote = prompt('Quote', config.quote) ?? config.quote;
      const quoteBy = prompt('Quote by', config.quoteBy) ?? config.quoteBy;
      const photo = prompt('Photo URL', config.photo) ?? config.photo;
      Object.assign(config, { name, birth, death, quote, quoteBy, photo });
      applyConfig(config);
    });

    renderMemories();
  </script>
</body>
</html>
